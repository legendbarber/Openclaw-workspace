<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invest Recommand · 추천 아카이브</title>
  <style>
    body{margin:0;background:#111315;color:#e5e7eb;font-family:Inter,Arial,sans-serif}
    .wrap{max-width:1280px;margin:0 auto;padding:18px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;background:#1a1d21;border:1px solid #2b3138;border-radius:14px;padding:14px}
    .muted{color:#9aa4b2}
    .tiny{font-size:12px;color:#97a1ae}
    button,a.button{background:#4b5563;border:0;color:#fff;padding:9px 12px;border-radius:10px;cursor:pointer;text-decoration:none}
    .card{background:#1a1d21;border:1px solid #2b3138;border-radius:12px;padding:14px;margin-top:12px}
    .row{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:12px}
    .big{font-size:24px;font-weight:700;line-height:1.2}
    .top-loader{position:fixed;top:0;left:0;right:0;height:3px;background:transparent;z-index:9999;overflow:hidden;display:none}
    .top-loader .bar{position:absolute;height:100%;width:28%;background:#9ca3af;animation:slide 1.1s linear infinite;border-radius:999px}
    @keyframes slide{0%{left:-30%}100%{left:100%}}
    .chart-pane{height:230px;min-height:230px;margin-top:8px;background:#0f172a;border:1px solid #24304f;border-radius:10px;padding:4px;box-sizing:border-box;overflow:hidden}
    .archive-chart-refresh{background:#10b981;border:none;color:#fff;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .2s ease}
    .archive-chart-refresh:hover{opacity:.85}
    .archive-card{position:relative}
    .archive-delete{position:absolute;top:10px;right:10px;background:#334155;border:1px solid #475569;color:#e2e8f0;width:24px;height:24px;border-radius:999px;line-height:20px;padding:0;font-size:14px;font-weight:700;cursor:pointer}
    .archive-delete:hover{background:#b91c1c;border-color:#ef4444;color:#fff}
    .chart-wrapper{position:relative;width:100%;height:200px}
    .chart-tooltip{position:absolute;top:0;left:0;padding:4px 10px;background:rgba(15,23,42,0.95);border:1px solid #475569;border-radius:8px;font-size:11.5px;color:#f8fafc;pointer-events:none;white-space:nowrap;box-shadow:0 8px 20px rgba(0,0,0,0.45);display:none;z-index:2;}
    .chart-hit{pointer-events:all;touch-action:none;}
    .toast{position:fixed;bottom:16px;right:16px;background:rgba(15,23,42,0.95);padding:10px 16px;border-radius:12px;font-size:13px;box-shadow:0 10px 25px rgba(0,0,0,0.6);opacity:0;display:none;pointer-events:none;transition:opacity .2s ease}
    .toast.toast-error{background:#b91c1c}
    a{color:#cbd5e1}
  </style>
</head>
<body>
  <div id="topLoader" class="top-loader"><div class="bar"></div></div>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1 style="margin:0">Invest Recommand · 추천 아카이브</h1>
        <div class="muted">추천 카드 원본 내용을 보관합니다. 우상단 X로 삭제할 수 있습니다.</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end">
        <a class="button" href="/invest-recommend">현장 뷰</a>
        <button id="refreshArchive" type="button">새로 고침</button>
      </div>
    </div>

    <div id="archiveList"></div>
  </div>

<script>
const __archiveToastEl=document.createElement('div');
__archiveToastEl.id='archiveToast';
document.body.appendChild(__archiveToastEl);
let __archiveToastTimer=null;
function showToast(msg,isError=false){
  if(!__archiveToastEl) return;
  __archiveToastEl.textContent=msg;
  __archiveToastEl.className=isError?'toast toast-error':'toast';
  __archiveToastEl.style.display='block';
  __archiveToastEl.style.opacity='1';
  if(__archiveToastTimer) clearTimeout(__archiveToastTimer);
  __archiveToastTimer=setTimeout(()=>{__archiveToastEl.style.opacity='0';setTimeout(()=>{__archiveToastEl.style.display='none';},220);},2200);
}
function fmt(v,d=2){return (v===null||v===undefined||Number.isNaN(Number(v)))?'-':Number(v).toLocaleString(undefined,{maximumFractionDigits:d});}
function fmtPct(v,d=2){if(v===null||v===undefined||Number.isNaN(Number(v)))return'-';const n=Number(v);const sign=n>0?'+':'';return`${sign}${n.toLocaleString(undefined,{maximumFractionDigits:d})}%`;}
function setLoading(on){const el=document.getElementById('topLoader');if(!el)return;el.style.display=on?'block':'none';}
function stringifyEntry(arr){if(!Array.isArray(arr)||!arr.length)return'-';return arr.map(v=>fmt(v)).join(' ~ ');} 
function pctFrom(base, target){if(base===null||base===undefined||target===null||target===undefined||Number(base)===0) return null; return ((Number(target)-Number(base))/Number(base))*100;}
function expectedHorizon(ttlTradingDays){const d=Number(ttlTradingDays); if(!Number.isFinite(d)||d<=0) return '기간 정보 없음'; if(d<=3) return `단기(약 ${d}거래일 이내)`; if(d<=7) return `단기~스윙(약 ${d}거래일 이내)`; return `스윙(약 ${d}거래일 이내)`;}
function symbolId(symbol){return `archive-chart-${(symbol||'').replace(/[^a-zA-Z0-9_-]/g,'_')}`;}
function detailLink(symbol){return `<a href='/invest-recommend/symbol/${encodeURIComponent(symbol)}' title='추천근거 상세'>🔎 근거 상세</a>`;}

function movingAvg(arr, period){
  const out=[];
  let sum=0;
  for(let i=0;i<arr.length;i++){
    const v=Number(arr[i]);
    if(!Number.isFinite(v)){ out.push(null); continue; }
    sum += v;
    if(i>=period){
      const old=Number(arr[i-period]);
      if(Number.isFinite(old)) sum -= old;
    }
    out.push(i>=period-1 ? (sum/period) : null);
  }
  return out;
}

function renderCandleChart(target, chart){
  if(!target) return;
  target.innerHTML='';
  if(!chart||!chart.ok||!Array.isArray(chart.close)||!chart.close.length){
    target.innerHTML="<div class='tiny' style='line-height:190px;text-align:center;'>차트 데이터 없음</div>";
    return;
  }
  const N=Math.min(chart.close.length, 120);
  const start=chart.close.length-N;
  const labels=(chart.labels||[]).slice(start);
  const open=(chart.open||[]).slice(start).map(Number);
  const high=(chart.high||[]).slice(start).map(Number);
  const low=(chart.low||[]).slice(start).map(Number);
  const close=(chart.close||[]).slice(start).map(Number);
  if(!open.length||!high.length||!low.length||!close.length){
    target.innerHTML="<div class='tiny' style='line-height:190px;text-align:center;'>차트 데이터 없음</div>";
    return;
  }

  const ma20 = movingAvg(close, 20);
  const ma60 = movingAvg(close, 60);
  const ma120 = movingAvg(close, 120);
  const min = Math.min(...low.filter(Number.isFinite));
  const max = Math.max(...high.filter(Number.isFinite));
  const span = (max-min) || 1;

  const width=720, height=200, left=36, right=12, top=8, bottom=24;
  const plotW = width-left-right;
  const plotH = height-top-bottom;
  const x = (i)=> left + (i/(N-1||1))*plotW;
  const y = (v)=> top + (1-((v-min)/span))*plotH;

  const maPath = (arr)=> arr.map((v,i)=>Number.isFinite(v)?`${i===0?'M':'L'}${x(i).toFixed(2)} ${y(v).toFixed(2)}`:'').filter(Boolean).join(' ');

  const candleW = Math.max(2, Math.floor(plotW/N*0.65));
  const candles = open.map((o,i)=>{
    const h=high[i], l=low[i], c=close[i];
    if(![o,h,l,c].every(Number.isFinite)) return '';
    const up = c>=o;
    const color = up ? '#22c55e' : '#ef4444';
    const xi = x(i);
    const yo = y(o), yc = y(c), yh = y(h), yl = y(l);
    const bodyY = Math.min(yo,yc);
    const bodyH = Math.max(1, Math.abs(yc-yo));
    return `<g><line x1='${xi.toFixed(2)}' y1='${yh.toFixed(2)}' x2='${xi.toFixed(2)}' y2='${yl.toFixed(2)}' stroke='${color}' stroke-width='1'/><rect x='${(xi-candleW/2).toFixed(2)}' y='${bodyY.toFixed(2)}' width='${candleW}' height='${bodyH.toFixed(2)}' fill='${up?'rgba(34,197,94,0.75)':'rgba(239,68,68,0.75)'}' stroke='${color}' stroke-width='1'/></g>`;
  }).join('');

  const hitW = Math.max(4, plotW/N);
  const hitRects = labels.map((_,i)=>`<rect class='chart-hit' data-i='${i}' x='${(x(i)-hitW/2).toFixed(2)}' y='${top}' width='${hitW.toFixed(2)}' height='${plotH.toFixed(2)}' fill='transparent'/>`).join('');

  const tickIdx = [0, Math.floor((N-1)/2), N-1];
  const ticks = tickIdx.map(i=>`<text x='${x(i).toFixed(2)}' y='${(height-6)}' fill='#94a3b8' font-size='10' text-anchor='middle'>${(labels[i]||'').slice(2)}</text>`).join('');

  target.innerHTML = `
    <div class='chart-wrapper'>
      <svg viewBox='0 0 ${width} ${height}' width='100%' height='200'>
        <rect x='0' y='0' width='${width}' height='${height}' fill='transparent'/>
        <line x1='${left}' y1='${y(max).toFixed(2)}' x2='${width-right}' y2='${y(max).toFixed(2)}' stroke='#23324f' stroke-width='1'/>
        <line x1='${left}' y1='${y((max+min)/2).toFixed(2)}' x2='${width-right}' y2='${y((max+min)/2).toFixed(2)}' stroke='#23324f' stroke-width='1'/>
        <line x1='${left}' y1='${y(min).toFixed(2)}' x2='${width-right}' y2='${y(min).toFixed(2)}' stroke='#23324f' stroke-width='1'/>
        ${candles}
        <path d='${maPath(ma20)}' fill='none' stroke='#f59e0b' stroke-width='1.5'/>
        <path d='${maPath(ma60)}' fill='none' stroke='#60a5fa' stroke-width='1.5'/>
        <path d='${maPath(ma120)}' fill='none' stroke='#a78bfa' stroke-width='1.5'/>
        ${ticks}
        ${hitRects}
      </svg>
      <div class='chart-tooltip'></div>
    </div>
    <div class='tiny' style='margin-top:2px'>캔들 · MA20(주황) · MA60(하늘) · MA120(보라)</div>
  `;

  const wrapper = target.querySelector('.chart-wrapper');
  const tooltip = target.querySelector('.chart-tooltip');
  if(!wrapper || !tooltip) return;

  const hideTooltip = ()=>{ tooltip.style.display='none'; };
  const showTooltip = (evt, i)=>{
    if(i<0 || i>=labels.length) return;
    const d = labels[i] || '-';
    const txt = `${d} | O ${fmt(open[i])} H ${fmt(high[i])} L ${fmt(low[i])} C ${fmt(close[i])}`;
    tooltip.textContent = txt;
    tooltip.style.display='block';
    const wrapRect = wrapper.getBoundingClientRect();
    const tipRect = tooltip.getBoundingClientRect();
    const ex = evt.clientX - wrapRect.left;
    const ey = evt.clientY - wrapRect.top;
    let leftPos = ex + 12;
    let topPos = ey - tipRect.height - 8;
    if(leftPos + tipRect.width > wrapRect.width - 4) leftPos = wrapRect.width - tipRect.width - 4;
    if(leftPos < 4) leftPos = 4;
    if(topPos < 4) topPos = ey + 10;
    tooltip.style.left = `${leftPos}px`;
    tooltip.style.top = `${topPos}px`;
  };

  wrapper.querySelectorAll('.chart-hit').forEach(hit=>{
    const i = Number(hit.getAttribute('data-i'));
    hit.addEventListener('pointermove', (evt)=>showTooltip(evt, i));
    hit.addEventListener('pointerenter', (evt)=>showTooltip(evt, i));
    hit.addEventListener('pointerleave', hideTooltip);
    hit.addEventListener('pointercancel', hideTooltip);
  });
  wrapper.addEventListener('pointerleave', hideTooltip);
}

async function loadArchive(){
  setLoading(true);
  const container=document.getElementById('archiveList');
  if(!container) return;
  try{
    const res=await fetch(`/api/archive?t=${Date.now()}`);
    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      throw new Error(err?.error||'로드 실패');
    }
    const data=await res.json();
    const items=data?.items||[];
    if(!items.length){
      container.innerHTML="<div class='card'>아직 아카이브된 추천 카드가 없습니다. 추천 카드의 🗄️ 버튼으로 저장해 주세요.</div>";
      return;
    }
    container.innerHTML=`<div class='row'>${items.map(it=>{
      const chartId=symbolId(it.symbol);
      const chartMeta=it.chartFetchedAt?new Date(it.chartFetchedAt).toLocaleString():'-';
      const plan=it.plan||{};
      const components=it.components||{};
      const entryZone=stringifyEntry(plan.entryZone);
      const stopLoss=fmt(plan.stopLoss);
      const takeProfit1=fmt(plan.takeProfit1);
      const takeProfit2=fmt(plan.takeProfit2);
      const generatedAt=it.generatedAt?new Date(it.generatedAt).toLocaleString():'-';
      const currentPrice=fmt(it.currentPrice);
      const lossPct = pctFrom(it.currentPrice, plan.stopLoss);
      const profitPct = pctFrom(it.currentPrice, plan.takeProfit1);
      return `
      <div class='card archive-card'>
        <button class='archive-delete' data-symbol='${it.symbol}' title='아카이브 삭제'>×</button>
        <div class='big'>${it.symbol} ${it.name?`(${it.name})`:''}</div>
        <div>${detailLink(it.symbol)}</div>
        <div class='tiny'>생성 시각: ${generatedAt}</div>
        <div style='margin-top:8px'>카테고리: ${it.category||'-'} / 종합점수: <b>${fmt(it.score)}</b></div>
        <div>현재가: ${currentPrice} / 예상수익: ${fmtPct(it.expectedReturnPct)} / RR: ${fmt(it.riskReward)}</div>
        <div style='margin-top:6px'><b>리포트 컨센서스</b> 점수 ${fmt(components?.reportConsensus?.score)} · 목표가 ${fmt(components?.reportConsensus?.targetMeanPrice)} (${fmtPct(components?.reportConsensus?.upsidePct)}) · 의견수 ${fmt(components?.reportConsensus?.analystOpinions,0)}</div>
        <hr style='border-color:#2b3138;margin:10px 0'>
        <div><b>운용 계획</b></div>
        <div>진입 구간: ${entryZone}</div>
        <div>손절: ${stopLoss} / 익절1: ${takeProfit1} / 익절2: ${takeProfit2}</div>
        <div><b>예상 손실률:</b> ${fmtPct(lossPct)} / <b>예상 수익률:</b> ${fmtPct(profitPct)} / <b>수익률 평가 시점:</b> ${expectedHorizon(plan.ttlTradingDays)}</div>
        <div class='tiny' style='margin-top:6px'>시장: ${it.market||'all'} · 후보범위 ${it.candidateLimit||'-'} · 방법론 ${it.methodology||'-'}</div>
        <div class='chart-pane' id='${chartId}'></div>
        <div style='margin-top:8px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between'>
          <span class='tiny'>차트: ${it.chartPeriod||'6mo'} · ${it.chartInterval||'1d'} · ${chartMeta}</span>
          <button class='archive-chart-refresh' data-symbol='${it.symbol}'>차트 갱신</button>
        </div>
      </div>
      `;
    }).join('')}</div>`;
    items.forEach(it=>renderCandleChart(document.getElementById(symbolId(it.symbol)), it.chart));
    attachArchiveChartHandlers();
    attachArchiveDeleteHandlers();
  }catch(err){
    container.innerHTML=`<div class='card'>아카이브를 불러오는 동안 오류가 발생했습니다.<br>${err.message||err}</div>`;
    showToast('아카이브 로딩 실패', true);
  }finally{
    setLoading(false);
  }
}

function attachArchiveDeleteHandlers(){
  document.querySelectorAll('.archive-delete').forEach(btn=>{
    btn.onclick=async()=>{
      const symbol=btn.dataset.symbol;
      if(!symbol) return;
      if(!confirm(`${symbol} 아카이브 카드를 삭제할까요?`)) return;
      btn.disabled=true;
      try{
        const res=await fetch(`/api/archive/${encodeURIComponent(symbol)}`,{method:'DELETE'});
        const data=await res.json().catch(()=>({}));
        if(!res.ok){
          throw new Error(data?.error||data?.message||'삭제 실패');
        }
        showToast(`${symbol} 아카이브 삭제 완료`);
        await loadArchive();
      }catch(err){
        showToast(`삭제 실패: ${err.message||err}`, true);
      }finally{
        btn.disabled=false;
      }
    };
  });
}

function attachArchiveChartHandlers(){
  document.querySelectorAll('.archive-chart-refresh').forEach(btn=>{
    btn.onclick=async()=>{
      const symbol=btn.dataset.symbol;
      if(!symbol) return;
      btn.disabled=true;
      showToast(`${symbol} 차트 갱신 중...`);
      try{
        const res=await fetch(`/api/archive/${encodeURIComponent(symbol)}/chart/refresh`,{method:'POST'});
        const data=await res.json().catch(()=>({}));
        if(!res.ok){
          throw new Error(data?.error||data?.message||'차트 갱신 실패');
        }
        showToast(`${symbol} 차트 갱신 완료`);
        await loadArchive();
      }catch(err){
        showToast(`차트 갱신 실패: ${err.message||err}`, true);
      }finally{
        btn.disabled=false;
      }
    };
  });
}

document.getElementById('refreshArchive')?.addEventListener('click', loadArchive);
loadArchive();
</script>
</body>
</html>
