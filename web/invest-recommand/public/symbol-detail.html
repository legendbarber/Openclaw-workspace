<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>종목 근거 상세</title>
  <style>
    body{margin:0;background:#111315;color:#e5e7eb;font-family:Inter,Arial,sans-serif}
    .wrap{max-width:1100px;margin:auto;padding:18px}
    .card{background:#1a1d21;border:1px solid #2b3138;border-radius:12px;padding:14px;margin-top:12px}
    .muted{color:#9aa4b2}.tiny{font-size:12px;color:#97a1ae}a{color:#cbd5e1}
    .h{font-size:28px;font-weight:700}
  </style>
</head>
<body>
<div class="wrap">
  <div><a href="/invest-recommend">← 메인으로</a></div>
  <div id="head" class="card">불러오는 중...</div>
  <div id="company" class="card"></div>
  <div id="plan" class="card"></div>
  <div id="news" class="card"></div>
  <div id="reports" class="card"></div>
</div>
<script>
function fmt(v,d=2){return (v===null||v===undefined)?'-':Number(v).toLocaleString(undefined,{maximumFractionDigits:d});}
function pct(v,d=2){if(v===null||v===undefined||Number.isNaN(Number(v)))return '-';const n=Number(v);return `${n>0?'+':''}${n.toLocaleString(undefined,{maximumFractionDigits:d})}%`;}
function getSymbol(){const p=location.pathname.split('/'); return decodeURIComponent(p[p.length-1]||'').toUpperCase();}

function favorableNews(r){
  const hs=(r?.components?.crowd?.headlines||[]);
  const pos=['상승','수주','호재','성장','흑자','계약','확대','record','surge','upgrade','beat','gain'];
  const picked=hs.filter(h=>pos.some(k=>String(h).toLowerCase().includes(String(k).toLowerCase()))).slice(0,5);
  return (picked.length?picked:hs.slice(0,5));
}

function renderReports(r){
  const arr=r?.components?.reportConsensus?.reportLinks||[];
  if(!arr.length) return '<b>증권 리포트</b><br>- 리포트 정보가 없습니다.';
  return `<b>증권 리포트</b><br>` + arr.map((x,i)=>
    `${i+1}) ${x.date||'-'} · ${x.broker||'-'} · 목표가: <b>${fmt(x.targetPrice,0)}</b><br>`+
    `&nbsp;&nbsp;&nbsp;${x.title||'-'}<br>`+
    `&nbsp;&nbsp;&nbsp;<a href='${x.url}' target='_blank'>리포트 원문</a>`
  ).join('<br>');
}

(async()=>{
  const sym=getSymbol();
  const res=await fetch(`/api/symbol/${encodeURIComponent(sym)}/detail?t=${Date.now()}`,{cache:'no-store'});
  if(!res.ok){
    document.getElementById('head').innerHTML='종목을 찾을 수 없습니다. (메인에서 새로 조회 후 다시 열어주세요)';
    return;
  }
  const j=await res.json();
  const r=j.item;
  const c=r.components||{};
  const rc=c.reportConsensus||{};
  const tech=c.technical||{};
  const ci=c.companyInfo||{};

  document.getElementById('head').innerHTML=`
    <div class='h'>${r.symbol} (${r.name})</div>
    <div class='muted'>종합점수 ${fmt(r.score)} · 컨센서스 ${fmt(rc.score)} · 테마 ${fmt(c.theme?.score)} · 뉴스 ${fmt(c.crowd?.score)} · 기술 ${fmt(tech.score)}</div>
    <div>목표주가 컨센서스: <b>${fmt(rc.targetMeanPrice,0)}</b> (${pct(rc.upsidePct)}) / 의견수: ${fmt(rc.analystOpinions,0)} / 소스: ${rc.source||'-'}</div>
  `;

  document.getElementById('company').innerHTML=`
    <b>회사 기본 정보</b><br>
    - 업종: ${ci.sector||'-'} / 산업: ${ci.industry||'-'}<br>
    - 웹사이트: ${ci.website?`<a href='${ci.website}' target='_blank'>${ci.website}</a>`:'-'}<br>
    - 사업 개요:<br><span class='tiny'>${ci.summary||'요약 정보 없음'}</span>
  `;

  document.getElementById('plan').innerHTML=`
    <b>운용 계획</b><br>
    - 진입: ${fmt(r.plan?.entryZone?.[0])} ~ ${fmt(r.plan?.entryZone?.[1])}<br>
    - 손절: ${fmt(r.plan?.stopLoss)} / 익절1: ${fmt(r.plan?.takeProfit1)} / 익절2: ${fmt(r.plan?.takeProfit2)}<br>
    - 예상손실: ${pct(r.expectedLossPct)} / 예상수익(1차): ${pct(r.expectedReturnPct)}<br>
    - 기술 국면: ${tech.setup||'-'} (cross: ${tech.crossState||'-'}, 이격도: ${pct(tech.distMa20Pct)})
  `;

  const news=favorableNews(r);
  document.getElementById('news').innerHTML=`
    <b>최근 호재 뉴스</b><br>
    ${news.length?news.map((x,i)=>`${i+1}) ${x}`).join('<br>'):'- 뉴스 데이터 없음'}
  `;

  document.getElementById('reports').innerHTML=renderReports(r);
})();
</script>
</body>
</html>
