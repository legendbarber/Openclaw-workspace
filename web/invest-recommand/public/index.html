<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invest Recommand</title>
  <style>
    body{margin:0;background:#111315;color:#e5e7eb;font-family:Inter,Arial,sans-serif}
    .wrap{max-width:1280px;margin:0 auto;padding:18px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;background:#1a1d21;border:1px solid #2b3138;border-radius:14px;padding:14px}
    .badge{background:#374151;color:#f3f4f6;padding:7px 12px;border-radius:999px;font-size:13px}
    .muted{color:#9aa4b2}
    button{background:#4b5563;border:0;color:#fff;padding:9px 12px;border-radius:10px;cursor:pointer}
    .kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}
    .kpi .item{background:#1a1d21;border:1px solid #2b3138;border-radius:10px;padding:10px}
    .card{background:#1a1d21;border:1px solid #2b3138;border-radius:12px;padding:14px;margin-top:12px}
    .big{font-size:30px;font-weight:700;line-height:1.2}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media(max-width:980px){.kpi{grid-template-columns:repeat(2,1fr)}.row{grid-template-columns:1fr}}
    a{color:#cbd5e1}
    .tiny{font-size:12px;color:#97a1ae}
    .top-loader{position:fixed;top:0;left:0;right:0;height:3px;background:transparent;z-index:9999;overflow:hidden;display:none}
    .top-loader .bar{position:absolute;height:100%;width:28%;background:#9ca3af;animation:slide 1.1s linear infinite;border-radius:999px}
    @keyframes slide{0%{left:-30%}100%{left:100%}}
    .archive-btn{background:#2563eb;border:0;color:#fff;padding:6px 12px;border-radius:10px;font-size:13px;cursor:pointer;transition:transform .15s ease,background .15s ease}
    .archive-btn:hover{transform:translateY(-1px);background:#1d4ed8}
    .archive-btn.small{padding:4px 10px;font-size:12px}
    .archive-btn.icon{padding:5px 9px;font-size:16px;line-height:1}
    #investToast{position:fixed;bottom:20px;right:20px;background:rgba(55,65,81,0.95);padding:10px 16px;border-radius:10px;font-size:14px;box-shadow:0 10px 25px rgba(15,23,42,0.6);opacity:0;display:none;pointer-events:none;transition:opacity .2s ease}
    #investToast.toast-error{background:#b91c1c!important}
    .chart-wrapper{position:relative}
    .chart-tooltip{position:absolute;top:0;left:0;padding:4px 10px;background:rgba(15,23,42,0.95);border:1px solid #475569;border-radius:8px;font-size:11.5px;color:#f8fafc;pointer-events:none;white-space:nowrap;box-shadow:0 8px 20px rgba(0,0,0,0.45);display:none;z-index:2;}
    .chart-hit{pointer-events:all;touch-action:none;}
    .score-grid{display:grid;grid-template-columns:repeat(3,minmax(170px,1fr));gap:10px;margin-top:10px}
    .score-cell{background:#111827;border:1px solid #374151;border-radius:10px;padding:8px}
    .score-cell input[type='number']{width:80px;background:#0b1220;color:#fff;border:1px solid #475569;border-radius:6px;padding:4px 6px}
  </style>
</head>
<body>
  <div id="topLoader" class="top-loader"><div class="bar"></div></div>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1 id="pageTitle" style="margin:0">Invest Recommand · Trading Desk</h1>
        <div id="pageSubtitle" class="muted">Desk View: Top pick, execution plan, rankings, indicators</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end">
        <span id="marketBadge" class="badge">LIVE SCANNER</span>
        <label class="tiny" for="limitSelect">후보범위</label>

          <option value="50">50</option>
          <option value="100">100</option>
          <option value="200">200</option>
          <option value="300" selected>300</option>
        </select>
        <button onclick="refreshData()">새로 조회</button>
        <button id="refreshAllLimitsBtn" onclick="refreshAllLimits()">전체(50→100→200→300) 새로 조회</button>
        <button onclick="refreshChartsOnly()">차트만 최신화</button>
        <button onclick="updateUniverse()">시가총액 업데이트</button>
        <button onclick="location.href='/invest-recommend/archive'">추천 아카이브</button>
      </div>
    </div>

    <div class="card">
      <b>점수식 설정</b>
      <div class="tiny">추천 점수식 비율(기본): 종목점수 6 : 테마점수 4</div>
      <div class="tiny" style="margin-top:4px">아래에서 항목별 가중치를 직접 설정한 뒤 <b>적용</b> 버튼을 누르면 재계산됩니다.</div>
      <div class="score-grid">
        <div class="score-cell"><label><input type="checkbox" id="useStock" checked> 종목점수</label><br><input id="wStock" type="number" step="0.05" min="0" value="0.6"></div>
        <div class="score-cell"><label><input type="checkbox" id="useTheme" checked> 테마점수</label><br><input id="wTheme" type="number" step="0.05" min="0" value="0.4"></div>
        <div class="score-cell"><label><input type="checkbox" id="useNews"> 뉴스점수</label><br><input id="wNews" type="number" step="0.05" min="0" value="0.0"></div>
        <div class="score-cell"><label><input type="checkbox" id="useTechnical"> 기술점수</label><br><input id="wTechnical" type="number" step="0.05" min="0" value="0.0"></div>
        <div class="score-cell"><label>신뢰도(Conf) 반영</label><br><input id="wConfidence" type="number" step="0.01" min="0" max="0.5" value="0.10"></div>
        <div class="score-cell"><label>밸류갭 배율</label><br><input id="wValuation" type="number" step="0.05" min="0" value="0.20"></div>
      </div>
      <div style="margin-top:10px"><button onclick="applyScoreSettings()">점수식 적용</button></div>
    </div>

    <div id="progressBox" class="card" style="display:none"></div>

    <div class="kpi" id="kpiRow">
      <div class="item"><div class="tiny">Top Pick</div><b id="kpiSymbol">-</b></div>
      <div class="item"><div class="tiny">종합점수</div><b id="kpiScore">-</b></div>
      <div class="item"><div class="tiny">예상수익(1차)</div><b id="kpiRet">-</b></div>
      <div class="item"><div class="tiny">Risk/Reward</div><b id="kpiRR">-</b></div>
    </div>

    <div id="meta" class="card"></div>
    <div class="card">📁 과거 추천 기록 조회는 <a href="/invest-recommend/calendar">/invest-recommend/calendar</a> 에서 확인</div>
    <div id="notrade" class="card" style="display:none"></div>
    <div id="top" class="card"></div>
    <div id="scoreTop5" class="row"></div>
    <div id="breakdown" class="row"></div>
  </div>

<script>
let __chartForceNext = false;
let __notifyOnNextResult = false;
let __lastNotifiedSnapshot = '';
let __swReg = null;
let __pushSubscriptionSynced = false;
const VAPID_PUBLIC_KEY = 'BPl-6O7KJvhPwqLM_P2XVpUgOJ9ojjYMaaHtBPUlz1m--u52HTchETpBES5iZG1zhizz_MLKbOI8Xq53rq-cQ0o';
let __toastTimer = null;
const __investToast = document.createElement('div');
__investToast.id = 'investToast';
document.body.appendChild(__investToast);
function showToast(msg, isError=false){
  if(!__investToast) return;
  __investToast.textContent = msg;
  __investToast.className = isError ? 'toast toast-error' : 'toast';
  __investToast.style.display = 'block';
  __investToast.style.opacity = '1';
  if(__toastTimer) clearTimeout(__toastTimer);
  __toastTimer = setTimeout(()=>{
    __investToast.style.opacity = '0';
    setTimeout(()=>{__investToast.style.display='none';}, 220);
  }, 2200);
}
function fmt(v,d=2){return (v===null||v===undefined)?'-':Number(v).toLocaleString(undefined,{maximumFractionDigits:d});}
function getMarket(){
  const m = new URLSearchParams(location.search).get('market');
  return (m==='us'||m==='kr') ? m : 'all';
}
function marketText(m){
  if(m==='us') return 'US';
  if(m==='kr') return 'KR';
  return 'KR+US';
}
function setMarketHeader(){
  const m = getMarket();
  document.getElementById('marketBadge').textContent = `LIVE SCANNER · ${marketText(m)}`;
  document.getElementById('pageTitle').textContent = `Invest Recommand · Trading Desk (${marketText(m)})`;
  document.getElementById('pageSubtitle').textContent = m==='us' ? '미국주식 추천 전용 뷰' : (m==='kr' ? '한국주식 추천 전용 뷰' : 'KR+US 통합 추천 뷰');
}

function getLimit(){
  const v = Number(document.getElementById('limitSelect')?.value || 300);
  return [50,100,200,300].includes(v) ? v : 300;
}
function saveLimitPref(){
  const m = getMarket();
  const v = getLimit();
  localStorage.setItem(`invest_limit_${m}`, String(v));
}
function loadLimitPref(){
  const m = getMarket();
  const saved = Number(localStorage.getItem(`invest_limit_${m}`) || 300);
  const v = [50,100,200,300].includes(saved) ? saved : 300;
  const sel = document.getElementById('limitSelect');
  if(sel) sel.value = String(v);
}

const SCORE_DEFAULTS = { wStock:0.6, wTheme:0.4, wNews:0.0, wTechnical:0.0, wConfidence:0.10, wValuation:0.20 };

async function applyScoreSettings(){
  saveScorePref();
  await refreshData();
}

function getScoreConfig(){
  const num = (id, dv=0)=>{
    const v = Number(document.getElementById(id)?.value);
    return Number.isFinite(v) ? Math.max(0, v) : dv;
  };
  const asWeight = (useId, wId, dv=0)=> document.getElementById(useId)?.checked ? num(wId, dv) : 0;
  return {
    preset: 'default_6_4',
    wStock: asWeight('useStock','wStock',0.6),
    wTheme: asWeight('useTheme','wTheme',0.4),
    wNews: asWeight('useNews','wNews',0),
    wTechnical: asWeight('useTechnical','wTechnical',0),
    wConfidence: num('wConfidence',0.1),
    wValuation: num('wValuation',0.2),
  };
}

function saveScorePref(){
  const m = getMarket();
  localStorage.setItem(`invest_score_${m}`, JSON.stringify(getScoreConfig()));
}

function loadScorePref(){
  const m = getMarket();
  try{
    const raw = localStorage.getItem(`invest_score_${m}`);
    const c = raw ? JSON.parse(raw) : SCORE_DEFAULTS;
    document.getElementById('wStock').value = c.wStock ?? SCORE_DEFAULTS.wStock;
    document.getElementById('wTheme').value = c.wTheme ?? SCORE_DEFAULTS.wTheme;
    document.getElementById('wNews').value = c.wNews ?? SCORE_DEFAULTS.wNews;
    document.getElementById('wTechnical').value = c.wTechnical ?? SCORE_DEFAULTS.wTechnical;
    document.getElementById('wConfidence').value = c.wConfidence ?? SCORE_DEFAULTS.wConfidence;
    document.getElementById('wValuation').value = c.wValuation ?? SCORE_DEFAULTS.wValuation;
    document.getElementById('useStock').checked = (Number(c.wStock ?? SCORE_DEFAULTS.wStock)||0) > 0;
    document.getElementById('useTheme').checked = (Number(c.wTheme ?? SCORE_DEFAULTS.wTheme)||0) > 0;
    document.getElementById('useNews').checked = (Number(c.wNews ?? SCORE_DEFAULTS.wNews)||0) > 0;
    document.getElementById('useTechnical').checked = (Number(c.wTechnical ?? SCORE_DEFAULTS.wTechnical)||0) > 0;
  }catch(_){
    document.getElementById('wStock').value = SCORE_DEFAULTS.wStock;
    document.getElementById('wTheme').value = SCORE_DEFAULTS.wTheme;
    document.getElementById('wNews').value = SCORE_DEFAULTS.wNews;
    document.getElementById('wTechnical').value = SCORE_DEFAULTS.wTechnical;
    document.getElementById('wConfidence').value = SCORE_DEFAULTS.wConfidence;
    document.getElementById('wValuation').value = SCORE_DEFAULTS.wValuation;
    document.getElementById('useStock').checked = true;
    document.getElementById('useTheme').checked = true;
    document.getElementById('useNews').checked = false;
    document.getElementById('useTechnical').checked = false;
  }
}

function scoreQueryString(){
  const c = getScoreConfig();
  const p = new URLSearchParams();
  p.set('scorePreset', c.preset);
  p.set('wStock', String(c.wStock));
  p.set('wTheme', String(c.wTheme));
  p.set('wNews', String(c.wNews));
  p.set('wTechnical', String(c.wTechnical));
  p.set('wConfidence', String(c.wConfidence));
  p.set('wValuation', String(c.wValuation));
  return p.toString();
}

function appliedFormulaText(sc){
  const c = sc?.components || {};
  const fs = (n)=> Number(n||0).toFixed(2);
  return `Core=${fs(c.stock)}Stock+${fs(c.theme)}Theme+${fs(c.news)}News+${fs(c.technical)}Technical, conf=${fs(sc?.confidence)}, valuation=${fs(sc?.valuation)}`;
}

function recommendationFormulaText(item){
  const c = item?.components || {};
  const fs = (n)=> Number(n||0).toFixed(2);
  return `추천 점수식: 종합점수 = (${fs(c?.scoreMix?.stockWeight)}×종목 ${fs(item?.scoreBase)} + ${fs(c?.scoreMix?.themeWeight)}×테마 ${fs(c?.theme?.score)} + ${fs(c?.scoreMix?.newsWeight)}×뉴스 ${fs(c?.crowd?.score)} + ${fs(c?.scoreMix?.technicalWeight)}×기술 ${fs(c?.technical?.score)}) + 신뢰도/밸류갭 보정`;
}
function setLoading(on){
  const el=document.getElementById('topLoader');
  if(!el) return;
  el.style.display = on ? 'block' : 'none';
}
async function archiveSymbol(symbol){
  if(!symbol) return;
  const market = getMarket();
  const limit = getLimit();
  try{
    setLoading(true);
    const scoreConfig = getScoreConfig();
    const res = await fetch('/api/archive', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ symbol, market, limit, scoreConfig }),
    });
    const data = await res.json().catch(()=>({}));
    if(!res.ok){
      throw new Error(data?.error || data?.message || '아카이브 실패');
    }
    showToast(`${symbol} 아카이브 완료`);
  }catch(e){
    showToast(`아카이브 실패: ${e.message||e}`, true);
  }finally{
    setLoading(false);
  }
}
function initArchiveButtons(){
  document.querySelectorAll('.archive-btn[data-symbol]').forEach(btn => {
    btn.onclick = () => archiveSymbol(btn.dataset.symbol);
  });
}
async function apiGet(url){
  setLoading(true);
  try{
    const res = await fetch(url, { cache: 'no-store' });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    data.__status = res.status;
    return data;
  } finally {
    setLoading(false);
  }
}

async function ensureNotifyPermission(){
  if(!('Notification' in window)) return false;
  if(Notification.permission === 'granted') return true;
  if(Notification.permission === 'denied') return false;
  try{
    const perm = await Notification.requestPermission();
    return perm === 'granted';
  }catch(_){
    return false;
  }
}

async function ensureServiceWorker(){
  if(!('serviceWorker' in navigator)) return null;
  if(__swReg) return __swReg;
  try{
    __swReg = await navigator.serviceWorker.register('/invest-recommend/sw-notify.js', { scope: '/invest-recommend/' });
    return __swReg;
  }catch(_){
    return null;
  }
}

function urlBase64ToUint8Array(base64String){
  const padding = '='.repeat((4 - (base64String.length % 4)) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = window.atob(base64);
  const outputArray = new Uint8Array(rawData.length);
  for(let i=0;i<rawData.length;i++){
    outputArray[i] = rawData.charCodeAt(i);
  }
  return outputArray;
}

async function ensurePushSubscription(){
  if(__pushSubscriptionSynced) return null;
  if(!('PushManager' in window)) return null;
  if(Notification.permission !== 'granted') return null;
  const reg = await ensureServiceWorker();
  if(!reg) return null;
  try{
    let sub = await reg.pushManager.getSubscription();
    if(!sub){
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
      });
    }
    await fetch('/api/notifications/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ subscription: sub.toJSON() }),
    });
    __pushSubscriptionSynced = true;
    return sub;
  }catch(e){
    console.error('push subscription failed', e);
    return null;
  }
}

async function pushSystemNotification(title, body){
  if(!('Notification' in window) || Notification.permission !== 'granted') return;
  const reg = await ensureServiceWorker();
  if(reg && reg.showNotification){
    try{
      await reg.showNotification(title, {
        body,
        tag:'invest-recommend-ready',
        renotify:true,
        icon:'/invest-recommend/favicon.ico'
      });
      return;
    }catch(_){/* fallback below */}
  }
  try{
    new Notification(title, { body, tag:'invest-recommend-ready', renotify:true });
  }catch(_){/* noop */}
}

function notifyRecommendationReady(d, x){
  if(!x) return;
  const snapshotKey = `${d.generatedAt || ''}|${x.symbol || ''}|${x.score || ''}`;
  if(snapshotKey && snapshotKey === __lastNotifiedSnapshot) return;
  __lastNotifiedSnapshot = snapshotKey;

  const body = `${x.symbol} (${x.name}) · 점수 ${fmt(x.score)} · 예상수익 ${fmtPct(x.expectedReturnPct)}`;
  pushSystemNotification('추천 분석 완료', body);

  try{
    if(navigator.vibrate) navigator.vibrate([120, 60, 120]);
  }catch(_){/* noop */}
}

function showProgress(text){
  const el = document.getElementById('progressBox');
  if(!el) return;
  el.style.display = 'block';
  el.innerHTML = text;
}
function hideProgress(){
  const el = document.getElementById('progressBox');
  if(!el) return;
  el.style.display = 'none';
  el.innerHTML = '';
}

async function waitReportReady(market, limit, qs, maxWaitMs=25*60*1000){
  const started = Date.now();
  while(true){
    const p = await apiGet(`/api/report/progress?market=${market}&limit=${limit}&${qs}&t=${Date.now()}`);
    if(p.status==='done'){
      hideProgress();
      return;
    }
    if(p.status==='error'){
      showProgress(`❌ 분석 실패: ${p.progress?.error || 'unknown error'}`);
      throw new Error(p.progress?.error || 'report_job_failed');
    }
    if(p.status==='running'){
      const pr = p.progress || {};
      const done = pr.done ?? 0;
      const total = pr.total ?? 0;
      const pct = pr.progressPct ?? 0;
      const sym = pr.symbol || '-';
      showProgress(`⏳ 분석 중... ${done}/${total} (${pct}%) · 현재 ${sym}`);
    } else {
      // running 상태를 놓친 경우를 대비: 실제 report가 있으면 완료로 간주
      try{
        const r = await apiGet(`/api/report?market=${market}&limit=${limit}&${qs}&t=${Date.now()}`);
        if(r && !r.status && Array.isArray(r.rankings)){
          hideProgress();
          return;
        }
      }catch(_){/* noop */}
      showProgress('⏳ 분석 준비 중...');
    }

    if(Date.now() - started > maxWaitMs){
      throw new Error(`timeout_limit_${limit}`);
    }
    await new Promise(r=>setTimeout(r, 1200));
  }
}
function pctFrom(base, target){
  if(base===null||base===undefined||target===null||target===undefined||Number(base)===0) return null;
  return ((Number(target)-Number(base))/Number(base))*100;
}
function fmtPct(v,d=2){
  if(v===null||v===undefined||Number.isNaN(Number(v))) return '-';
  const n = Number(v);
  const sign = n>0?'+':'';
  return `${sign}${n.toLocaleString(undefined,{maximumFractionDigits:d})}%`;
}
function productDesc(symbol,name,category){
  const s = String(symbol||'').toUpperCase();
  const dict = {
    EEM:'신흥국(중국·인도·대만·브라질 등) 대형주에 분산 투자하는 ETF',
    EFA:'미국 제외 선진국(유럽·일본 등) 주식에 분산 투자하는 ETF',
    LQD:'미국 투자등급 회사채에 투자하는 ETF (상대적으로 방어적 성격)',
    VNQ:'미국 상장 리츠(REITs)에 투자하는 부동산 ETF',
    TLT:'미국 20년 이상 장기국채에 투자하는 ETF (금리 민감도 높음)'
  };
  return dict[s] || `${category||'자산'} 카테고리의 ${name||symbol||'투자상품'}`;
}
function expectedHorizon(ttlTradingDays){
  const d = Number(ttlTradingDays);
  if(!Number.isFinite(d) || d<=0) return '기간 정보 없음';
  if(d<=3) return `단기(약 ${d}거래일 이내)`;
  if(d<=7) return `단기~스윙(약 ${d}거래일 이내)`;
  return `스윙(약 ${d}거래일 이내)`;
}
function detailLink(symbol){
  return `<a href='/invest-recommend/symbol/${encodeURIComponent(symbol)}' title='추천근거 상세'>🔎 근거 상세</a>`;
}
function recommendationWhy(r, mode='risk'){
  const c = r?.components || {};
  const m = c.momentum || {};
  const rc = c.reportConsensus || {};
  const crowd = c.crowd || {};
  const risk = c.risk || {};
  const tech = c.technical || {};
  const liq = c.liquidityScore;

  const reasons = [];
  if(mode==='risk') reasons.push(`RR ${fmt(r.riskReward)} (위험 1 대비 기대수익)`);
  if(mode==='return') reasons.push(`예상수익 ${fmtPct(r.expectedReturnPct)} (1차 익절 기준)`);

  reasons.push(`리포트합의 ${fmt(rc.score)}점 (목표가 괴리 ${fmtPct(rc.upsidePct)})`);
  reasons.push(`군중신호 ${fmt(crowd.score)}점 (톤 ${fmt(crowd.tone,0)}, 헤드라인 ${fmt(crowd.headlineCount,0)}개)`);
  reasons.push(`기술분석 ${fmt(tech.score)}점 (RSI ${fmt(tech.rsi14)} / MA20 이격 ${fmtPct(tech.distMa20Pct)} / 20일고점대비 ${fmtPct(tech.from20dHighPct)} / 셋업 ${tech.setup||'-'})`);
  reasons.push(`유동성 ${fmt(liq)}점 · 리스크 ${fmt(risk.score)}점 (변동성 ${fmtPct(risk.volPct)} / MDD ${fmtPct(risk.maxDrawdownPct)})`);
  reasons.push(`(참고) 모멘텀 ${fmt(m.score)}점 (1M ${fmtPct(m.m1Pct)} / 3M ${fmtPct(m.m3Pct)} / 6M ${fmtPct(m.m6Pct)})`);
  reasons.push(`종합점수 ${fmt(r.score)} = 0.50종목 + 0.30테마 + 0.10뉴스 + 0.10기술`);

  return reasons.join('<br>');
}

async function renderMiniChart(symbol, elId, force=false){
  const el = document.getElementById(elId);
  if(!el) return;

  try{
    const res = await fetch(`/api/chart/${encodeURIComponent(symbol)}?period=1y&interval=1d&refresh=${force?1:0}&t=${Date.now()}`);
    const d = await res.json();
    if(!res.ok || !d.ok || !d.open?.length || !d.high?.length || !d.low?.length || !d.close?.length){
      el.innerHTML = `<div class='tiny'>차트 로딩 실패 · <a href='https://finance.yahoo.com/quote/${symbol}' target='_blank'>Yahoo 차트 보기</a></div>`;
      return;
    }

    const n = Math.min(d.open.length, d.high.length, d.low.length, d.close.length);
    if(!n){
      el.innerHTML = `<div class='tiny'>차트 데이터 없음</div>`;
      return;
    }

    const labels = (d.labels || []).slice(-180);
    const o = d.open.slice(-180).map(Number);
    const hArr = d.high.slice(-180).map(Number);
    const lArr = d.low.slice(-180).map(Number);
    const c = d.close.slice(-180).map(Number);
    const vArr = (d.volume || []).slice(-180).map(Number);
    const m = o.length;

    const all = [...hArr, ...lArr].filter(v=>Number.isFinite(v));
    if(!all.length){
      el.innerHTML = `<div class='tiny'>차트 데이터 없음</div>`;
      return;
    }

    const sma = (arr, p)=>arr.map((_,i)=>{
      if(i < p-1) return null;
      const wv = arr.slice(i-p+1,i+1).filter(Number.isFinite);
      if(wv.length!==p) return null;
      return wv.reduce((a,b)=>a+b,0)/p;
    });
    const ma20 = sma(c,20);
    const ma60 = sma(c,60);
    const ma120 = sma(c,120);

    const w = 340, hPx = 180;
    const pL = 8, pR = 46, pT = 10, pB = 16;
    const volH = 42;
    const priceH = hPx - pT - pB - volH - 8;
    const plotW = w - pL - pR;

    const minRaw = Math.min(...all);
    const maxRaw = Math.max(...all);
    const pad = (maxRaw - minRaw) * 0.06;
    const min = minRaw - pad;
    const max = maxRaw + pad;
    const span = (max - min) || 1;
    const y = (v) => pT + (max - v) / span * priceH;

    const volTop = pT + priceH + 8;
    const maxVol = Math.max(...vArr.filter(Number.isFinite), 1);

    const slot = plotW / (m || 1);
    const bodyW = Math.max(2, Math.min(7, slot * 0.62));

    const grid = [];
    for(let i=0;i<=4;i++){
      const gy = pT + (priceH/4)*i;
      grid.push(`<line x1='${pL}' y1='${gy.toFixed(2)}' x2='${w-pR}' y2='${gy.toFixed(2)}' stroke='#24304f' stroke-width='1'/>`);
    }

    const wick = [];
    const body = [];
    const vols = [];
    const pointerOverlays = [];
    for(let i=0;i<m;i++){
      const cx = pL + slot*i + slot/2;
      const oy = y(o[i]);
      const cy = y(c[i]);
      const hy = y(hArr[i]);
      const ly = y(lArr[i]);
      const up = c[i] >= o[i];
      const color = up ? '#22c55e' : '#ef4444';

      wick.push(`<line x1='${cx.toFixed(2)}' y1='${hy.toFixed(2)}' x2='${cx.toFixed(2)}' y2='${ly.toFixed(2)}' stroke='${color}' stroke-width='1.1'/>`);
      const top = Math.min(oy, cy);
      const bh = Math.max(Math.abs(cy - oy), 1.2);
      body.push(`<rect x='${(cx-bodyW/2).toFixed(2)}' y='${top.toFixed(2)}' width='${bodyW.toFixed(2)}' height='${bh.toFixed(2)}' rx='0.6' fill='${color}'/>`);

      const vol = Number.isFinite(vArr[i]) ? vArr[i] : 0;
      const vh = (vol / maxVol) * volH;
      vols.push(`<rect x='${(cx-bodyW/2).toFixed(2)}' y='${(volTop + (volH-vh)).toFixed(2)}' width='${bodyW.toFixed(2)}' height='${Math.max(vh,0.8).toFixed(2)}' fill='${up ? '#1f9d55' : '#b91c1c'}' opacity='0.75'/>`);

      const pointerWidth = Math.max(slot * 0.92, 6);
      const pointerHeight = priceH + volH + 18;
      const pointerX = cx - pointerWidth / 2;
      const pointerY = pT - 4;
      const label = labels[i] || '';
      const safeLabel = label.replace(/"/g,'&quot;').replace(/'/g,'&#39;');
      const closeVal = Number.isFinite(c[i]) ? c[i] : null;
      pointerOverlays.push(`<rect x='${pointerX.toFixed(2)}' y='${pointerY.toFixed(2)}' width='${pointerWidth.toFixed(2)}' height='${pointerHeight.toFixed(2)}' fill='transparent' data-i='${i}' data-date='${safeLabel}' data-price='${closeVal !== null ? closeVal.toFixed(4) : ''}' class='chart-hit'/>`);
    }

    const toPath = (arr)=>{
      const pts = [];
      for(let i=0;i<m;i++){
        if(!Number.isFinite(arr[i])) continue;
        const x = pL + slot*i + slot/2;
        const yy = y(arr[i]);
        pts.push(`${x.toFixed(2)},${yy.toFixed(2)}`);
      }
      return pts.join(' ');
    };

    const ma20Path = toPath(ma20);
    const ma60Path = toPath(ma60);
    const ma120Path = toPath(ma120);

    const maxTxt = maxRaw.toLocaleString(undefined,{maximumFractionDigits:0});
    const minTxt = minRaw.toLocaleString(undefined,{maximumFractionDigits:0});

    el.innerHTML = `
      <div class='chart-wrapper'>
        <svg viewBox='0 0 ${w} ${hPx}' width='100%' height='180' preserveAspectRatio='xMidYMid meet'>
          <rect x='0' y='0' width='${w}' height='${hPx}' fill='#0f172a' rx='6'/>
          ${grid.join('')}
          ${wick.join('')}
          ${body.join('')}
          ${ma20Path ? `<polyline fill='none' stroke='#f59e0b' stroke-width='1.4' points='${ma20Path}'/>` : ''}
          ${ma60Path ? `<polyline fill='none' stroke='#60a5fa' stroke-width='1.4' points='${ma60Path}'/>` : ''}
          ${ma120Path ? `<polyline fill='none' stroke='#a78bfa' stroke-width='1.4' points='${ma120Path}'/>` : ''}
          <line x1='${pL}' y1='${volTop-1}' x2='${w-pR}' y2='${volTop-1}' stroke='#24304f' stroke-width='1'/>
          ${vols.join('')}
          <line id='crosshair-v' x1='${pL}' y1='${pT-4}' x2='${pL}' y2='${(volTop+volH+4).toFixed(2)}' stroke='#94a3b8' stroke-width='1' stroke-dasharray='3 3' opacity='0'/>
          <line id='crosshair-h' x1='${pL}' y1='${pT}' x2='${w-pR}' y2='${pT}' stroke='#94a3b8' stroke-width='1' stroke-dasharray='3 3' opacity='0'/>
          ${pointerOverlays.join('')}
          <text x='${w-pR+4}' y='${(pT+10).toFixed(1)}' fill='#93a4c7' font-size='10'>${maxTxt}</text>
          <text x='${w-pR+4}' y='${(pT+priceH).toFixed(1)}' fill='#93a4c7' font-size='10'>${minTxt}</text>
          <text x='${pL}' y='${(hPx-4).toFixed(1)}' fill='#f59e0b' font-size='10'>MA20</text>
          <text x='${(pL+38).toFixed(1)}' y='${(hPx-4).toFixed(1)}' fill='#60a5fa' font-size='10'>MA60</text>
          <text x='${(pL+76).toFixed(1)}' y='${(hPx-4).toFixed(1)}' fill='#a78bfa' font-size='10'>MA120</text>
          <text x='${(w-pR-28).toFixed(1)}' y='${(volTop+10).toFixed(1)}' fill='#93a4c7' font-size='9'>VOL</text>
        </svg>
        <div class='chart-tooltip'></div>
      </div>
    `;

    const wrapper = el.querySelector('.chart-wrapper');
    const tooltip = el.querySelector('.chart-tooltip');
    const crossV = el.querySelector('#crosshair-v');
    const crossH = el.querySelector('#crosshair-h');
    if(wrapper && tooltip){
      const hits = wrapper.querySelectorAll('.chart-hit');
      const hideTooltip = () => {
        tooltip.style.display = 'none';
        if(crossV) crossV.setAttribute('opacity', '0');
        if(crossH) crossH.setAttribute('opacity', '0');
      };
      const updateTooltip = (evt, txt, i) => {
        tooltip.textContent = txt;
        tooltip.style.display = 'block';
        const bounds = wrapper.getBoundingClientRect();
        const tipRect = tooltip.getBoundingClientRect();
        const offsetX = evt.clientX - bounds.left;
        const offsetY = evt.clientY - bounds.top;
        let left = offsetX - tipRect.width / 2;
        left = Math.max(4, Math.min(left, bounds.width - tipRect.width - 4));
        let top = offsetY - tipRect.height - 10;
        if(top < 4) top = offsetY + 6;
        tooltip.style.left = `${left}px`;
        tooltip.style.top = `${top}px`;

        if(Number.isFinite(i)){
          const cx = pL + slot*i + slot/2;
          const cy = y(c[i]);
          if(crossV){
            crossV.setAttribute('x1', cx.toFixed(2));
            crossV.setAttribute('x2', cx.toFixed(2));
            crossV.setAttribute('opacity', '1');
          }
          if(crossH){
            crossH.setAttribute('y1', cy.toFixed(2));
            crossH.setAttribute('y2', cy.toFixed(2));
            crossH.setAttribute('opacity', '1');
          }
        }
      };

      hits.forEach(hit => {
        const label = hit.dataset.date || '';
        const priceVal = Number(hit.dataset.price);
        const idx = Number(hit.dataset.i);
        const parts = [];
        if(label) parts.push(`날짜 ${label}`);
        if(Number.isFinite(priceVal)) parts.push(`종가 ${fmt(priceVal)}`);
        const txt = parts.join(' · ') || '날짜 정보 없음';
        const handler = (evt) => updateTooltip(evt, txt, idx);
        hit.addEventListener('pointerenter', handler);
        hit.addEventListener('pointermove', handler);
        hit.addEventListener('pointerleave', hideTooltip);
        hit.addEventListener('pointercancel', hideTooltip);
      });
      wrapper.addEventListener('pointerleave', hideTooltip);
    }
  }catch(_){
    el.innerHTML = `<div class='tiny'>차트 로딩 실패 · <a href='https://finance.yahoo.com/quote/${symbol}' target='_blank'>Yahoo 차트 보기</a></div>`;
  }
}

async function updateUniverse(){
  try{
    showProgress('⏳ 시가총액 상위 300 파일 업데이트 중...');
    const res = await fetch(`/api/universe/update?t=${Date.now()}`, { method:'POST' });
    const d = await res.json();
    if(!res.ok || !d.ok){
      showProgress(`❌ 업데이트 실패: ${d?.message || res.status}`);
      return;
    }
    showProgress(`✅ 업데이트 완료 (US ${d.us} / KR ${d.kr})`);
    await new Promise(r=>setTimeout(r,1000));
    hideProgress();
  }catch(e){
    showProgress(`❌ 업데이트 실패: ${e.message}`);
  }
}

async function refreshChartsOnly(){
  __chartForceNext = true;
  await loadData();
  __chartForceNext = false;
}

async function refreshData(){
  const market = getMarket();
  const limit = getLimit();
  __notifyOnNextResult = true;
  await ensureNotifyPermission();
  await ensurePushSubscription();
  saveLimitPref();
  saveScorePref();
  const qs = scoreQueryString();
  const r = await apiGet(`/api/report/refresh?market=${market}&limit=${limit}&${qs}&t=${Date.now()}`);
  if(r.status==='running' || r.__status===202){
    const pr = r.progress || {};
    showProgress(`⏳ 분석 시작... ${pr.done ?? 0}/${pr.total ?? 0} (${pr.progressPct ?? 0}%)`);
    await waitReportReady(market, limit, qs);
    await loadData();
    return;
  }
  await loadData();
}

async function refreshAllLimits(){
  const btn = document.getElementById('refreshAllLimitsBtn');
  const limits = [50, 100, 200, 300];
  const market = getMarket();
  const prevLimit = getLimit();
  if(btn) btn.disabled = true;
  const results = [];
  try{
    saveScorePref();
    const qs = scoreQueryString();
    for(let i=0;i<limits.length;i++){
      const lim = limits[i];
      const sel = document.getElementById('limitSelect');
      if(sel) sel.value = String(lim);
      saveLimitPref();

      showProgress(`⏳ 전체 순차 조회 중... (${i+1}/${limits.length}) limit=${lim}`);
      try{
        const r = await apiGet(`/api/report/refresh?market=${market}&limit=${lim}&${qs}&t=${Date.now()}`);
        if(r.status==='running' || r.__status===202){
          await waitReportReady(market, lim, qs);
        }
        // 최종 report 존재 확인
        const chk = await apiGet(`/api/report?market=${market}&limit=${lim}&${qs}&t=${Date.now()}`);
        if(chk && !chk.status && Array.isArray(chk.rankings)){
          results.push({limit: lim, ok: true});
        }else{
          results.push({limit: lim, ok: false, msg: 'no_report'});
        }
      }catch(err){
        results.push({limit: lim, ok: false, msg: err?.message || String(err)});
      }
    }

    const sel = document.getElementById('limitSelect');
    if(sel) sel.value = String(prevLimit);
    saveLimitPref();
    hideProgress();

    const ok = results.filter(x=>x.ok).length;
    const fail = results.length - ok;
    const failTxt = results.filter(x=>!x.ok).map(x=>`${x.limit}:${x.msg}`).join(', ');
    if(fail===0){
      showToast('전체 순차 조회 완료 (50→100→200→300)');
    }else{
      showToast(`부분 실패 · 성공 ${ok}/4 · 실패 ${fail} (${failTxt})`, true);
    }
    await loadData();
  }catch(e){
    showProgress(`❌ 전체 순차 조회 실패: ${e.message || e}`);
    showToast(`전체 순차 조회 실패: ${e.message || e}`, true);
  }finally{
    if(btn) btn.disabled = false;
  }
}

      <b>테마:</b> ${r.components?.theme?.theme || '-'} (반영 ${fmt(r.components?.theme?.score)})<br>
      <span class='tiny'>${recommendationFormulaText(r)}</span><br>
      목표주가 컨센서스: ${fmt(r.components?.reportConsensus?.targetMeanPrice)} (${fmtPct(r.components?.reportConsensus?.upsidePct)})<br>
      <b>컨센서스:</b> 점수 ${fmt(r.components?.reportConsensus?.score)} / 의견수 ${fmt(r.components?.reportConsensus?.analystOpinions,0)} / 소스 ${r.components?.reportConsensus?.source || '-'}<br>
      <b>설명:</b> ${productDesc(r.symbol, r.name, r.category)}<br>
      진입: ${fmt(r.plan.entryZone[0])}~${fmt(r.plan.entryZone[1])}<br>
      손절: ${fmt(r.plan.stopLoss)} / 익절1: ${fmt(r.plan.takeProfit1)}<br>
      <b>예상 손실률:</b> ${fmtPct(lossPct)} / <b>예상 수익률:</b> ${fmtPct(profitPct)}<br>
      <b>RR(기대수익/위험):</b> ${fmt(r.riskReward || (profitPct && lossPct ? (profitPct/Math.abs(lossPct)) : null))}<br>
      <b>수익률 평가 시점:</b> ${expectedHorizon(r.plan.ttlTradingDays)}<br>
      <b>미니 차트 (3개월):</b><br><div id='score-mini-${idx}' style='height:190px;min-height:190px;margin-top:6px;background:#0f172a;border:1px solid #24304f;border-radius:8px;padding:4px;box-sizing:border-box;overflow:hidden;'></div><br>
    </div>
  `}).join('');

  await renderMiniChart(x.symbol, 'mini-top', __chartForceNext);
  for(let i=0;i<scoreTop30.length;i++){
    await renderMiniChart(scoreTop30[i].symbol, `score-mini-${i}`, __chartForceNext);
  }

  const c = x.components;
  document.getElementById('breakdown').innerHTML = `
    <div class='card'>
      <b>R) 리포트/기관 합의</b><br>
      점수: ${fmt(c.reportConsensus.score)}<br>
      목표주가 컨센서스: ${fmt(c.reportConsensus.targetMeanPrice)}<br>
      목표가 괴리: ${fmt(c.reportConsensus.upsidePct)}%<br>
      추천지수: ${fmt(c.reportConsensus.recommendationMean)} / 의견수: ${fmt(c.reportConsensus.analystOpinions,0)} / 소스: ${c.reportConsensus.source || '-'}
    </div>
    <div class='card'>
      <b>T) 기술적 분석(차트/가격)</b><br>
      점수: ${fmt(c.technical?.score)} / 셋업: ${c.technical?.setup||'-'}<br>
      RSI(14): ${fmt(c.technical?.rsi14)} / MA20 이격: ${fmt(c.technical?.distMa20Pct)}% / 20일 고점대비: ${fmt(c.technical?.from20dHighPct)}%
    </div>
    <div class='card'>
      <b>TH) 테마 강도</b><br>
      테마: ${c.theme?.theme || '-'}<br>
      테마점수: ${fmt(c.theme?.themeScore)} / 리더점수: ${fmt(c.theme?.leaderScore)} / 반영점수: ${fmt(c.theme?.score)}<br>
      밸류갭 보정(목표가-현재가): ${fmt(c.valuation?.adjustment)}점 (괴리 ${fmtPct(c.valuation?.upsidePct)})
    </div>
  `;
  initArchiveButtons();
}

setMarketHeader();
loadLimitPref();
loadScorePref();
ensureServiceWorker();
loadData();
</script>
</body>
</html>
